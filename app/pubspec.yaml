name: autofix_ai_simulator
description: "AutoFix AI Simulator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # HTTP & API
  http: ^1.3.0
  # Firebase Auth
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  # Storage
  shared_preferences: ^2.5.3
  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.7.0
  # Play Games / Game Center
  games_services: ^3.0.0
  # Monetization
  purchases_flutter: ^10.0.1
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
